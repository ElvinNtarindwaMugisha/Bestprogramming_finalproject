version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lostfound_postgres
    restart: always
    environment:
      POSTGRES_DB: lostfound_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: lostfound_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Inject database configuration directly into Spring Boot environment
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lostfound_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db

volumes:
  postgres_data:
